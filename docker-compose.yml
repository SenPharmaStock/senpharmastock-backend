services:
  db:
    image: postgres:16
    container_name: senpharmastock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: senpharmastock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "3307:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: