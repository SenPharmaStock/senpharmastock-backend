name: Qodana

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          results-dir: ${{ runner.temp }}/qodana/results
          use-caches: true
          use-annotations: true
          post-pr-comment: false
          upload-result: false
          push-fixes: none

      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: ${{ runner.temp }}/qodana/results
          retention-days: 30
